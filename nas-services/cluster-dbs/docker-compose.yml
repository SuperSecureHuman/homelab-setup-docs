services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/postgres/pgdata:/var/lib/postgresql
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PgBouncer ──────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    volumes:
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "5432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  # ── MariaDB ────────────────────────────────────────────────
  mariadb:
    image: mariadb:11.8.6-noble
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/mariadb/data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ProxySQL ───────────────────────────────────────────────
  proxysql:
    image: proxysql/proxysql:3.0.8
    restart: unless-stopped
    volumes:
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/proxysql/data:/var/lib/proxysql
    ports:
      - "3306:6033"
      - "6032:6032"
    depends_on:
      mariadb:
        condition: service_healthy

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:8.6.2-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/redis/data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Postgres Exporter ──────────────────────────────────────
  postgres-exporter:
    image: ghcr.io/nbari/pg_exporter:latest
    restart: unless-stopped
    environment:
      PG_EXPORTER_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    command:
      - --collector.database
      - --collector.locks
      - --collector.stat
      - --collector.replication
      - --collector.index
      - --collector.statements
      - --collector.tls
      - --collector.exporter
    ports:
      - "9432:9432"
    depends_on:
      postgres:
        condition: service_healthy

  # ── MySQL Exporter ─────────────────────────────────────────
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    restart: unless-stopped
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    command:
      - --mysqld.username=root
      - --mysqld.address=mariadb:3306
    ports:
      - "9104:9104"
    depends_on:
      mariadb:
        condition: service_healthy

  # ── Redis Exporter ─────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  # ── DBgate ─────────────────────────────────────────────────
  dbgate:
    image: dbgate/dbgate:latest
    restart: unless-stopped
    volumes:
      - /mnt/ssd_mirror/docker_mounts/cluster_dbs/dbgate/data:/root/.dbgate
    ports:
      - "8090:3000"
    depends_on:
      - postgres
      - mariadb
      - redis
